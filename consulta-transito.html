<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consulta Organismos de Tránsito</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --azul:     #0b3b6e;
      --azul-med: #1155a8;
      --azul-clr: #2176d2;
      --acento:   #f0a500;
      --fondo:    #f4f7fb;
      --blanco:   #ffffff;
      --gris1:    #e8eef6;
      --gris2:    #b0beca;
      --texto:    #111827;
      --muted:    #6b7280;
      --error-bg: #fff1f1;
      --error-tx: #b91c1c;
      --radio:    14px;
    }

    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: var(--fondo);
      padding: 32px 20px 48px;
      min-height: 100vh;
    }

    /* ── Encabezado ── */
    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .header-badge {
      display: inline-block;
      background: var(--azul);
      color: var(--acento);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 20px;
      margin-bottom: 14px;
    }

    .header h1 {
      font-size: clamp(22px, 4vw, 32px);
      font-weight: 700;
      color: var(--azul);
      line-height: 1.2;
      margin-bottom: 10px;
    }

    .header p {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
    }

    .ejemplos {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
    }

    .chip {
      background: var(--blanco);
      border: 1.5px solid var(--gris1);
      color: var(--azul-med);
      font-size: 13px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 20px;
      cursor: pointer;
      transition: background .2s, border-color .2s;
    }

    .chip:hover {
      background: var(--azul);
      border-color: var(--azul);
      color: #fff;
    }

    /* ── Buscador ── */
    .buscador {
      max-width: 680px;
      margin: 0 auto 30px;
      display: flex;
      gap: 10px;
    }

    .input-wrap {
      flex: 1;
      position: relative;
    }

    .input-wrap svg {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gris2);
      pointer-events: none;
    }

    input[type="text"] {
      width: 100%;
      padding: 15px 16px 15px 46px;
      border: 2px solid var(--gris1);
      border-radius: var(--radio);
      font-family: inherit;
      font-size: 15px;
      color: var(--texto);
      background: var(--blanco);
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }

    input[type="text"]:focus {
      border-color: var(--azul-clr);
      box-shadow: 0 0 0 3px rgba(33,118,210,.15);
    }

    input[type="text"]::placeholder { color: var(--gris2); }

    .btn-consultar {
      padding: 15px 26px;
      background: var(--azul);
      color: #fff;
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      border: none;
      border-radius: var(--radio);
      cursor: pointer;
      letter-spacing: .02em;
      transition: background .2s, transform .1s;
      white-space: nowrap;
    }

    .btn-consultar:hover  { background: var(--azul-med); }
    .btn-consultar:active { transform: scale(.97); }

    /* ── Mensaje de error ── */
    .error-msg {
      display: none;
      max-width: 680px;
      margin: 0 auto 20px;
      padding: 16px 20px;
      background: var(--error-bg);
      color: var(--error-tx);
      border-radius: var(--radio);
      font-weight: 600;
      font-size: 15px;
      text-align: center;
    }

    /* ── Resultados ── */
    #contenedorResultados { max-width: 900px; margin: 0 auto; }

    .resultado {
      background: var(--blanco);
      border-radius: 18px;
      box-shadow: 0 4px 20px rgba(11,59,110,.07);
      overflow: hidden;
      margin-bottom: 24px;
      animation: fadeUp .35s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .resultado-header {
      background: var(--azul);
      padding: 20px 26px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .resultado-icono {
      width: 42px;
      height: 42px;
      background: rgba(255,255,255,.12);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--acento);
    }

    .resultado-nombre {
      font-size: 17px;
      font-weight: 700;
      color: #fff;
      line-height: 1.3;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 1px;
      background: var(--gris1);
    }

    .card {
      background: var(--blanco);
      padding: 20px 22px;
      position: relative;
    }

    .card-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .card-valor {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 19px;
      font-weight: 500;
      color: var(--texto);
    }

    .card-valor.highlight {
      color: var(--azul-med);
    }

    /* Barra de progreso pago */
    .barra-wrap {
      margin-top: 10px;
      height: 5px;
      background: var(--gris1);
      border-radius: 10px;
      overflow: hidden;
    }

    .barra-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--azul-clr), var(--acento));
      border-radius: 10px;
      transition: width .6s ease;
    }

    .barra-pct {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }

    /* ── Responsive ── */
    @media (max-width: 560px) {
      .buscador       { flex-direction: column; }
      .btn-consultar  { width: 100%; }
      .card-valor     { font-size: 16px; }
      .resultado-nombre { font-size: 15px; }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-badge">RUNT · Colombia</div>
  <h1>Consulta de Organismos de Tránsito</h1>
  <p>Busque por ciudad, municipio, departamento o nombre del organismo.</p>
  <div class="ejemplos">
    <span class="chip" onclick="buscarChip('Barranquilla')">Barranquilla</span>
    <span class="chip" onclick="buscarChip('Bello')">Bello</span>
    <span class="chip" onclick="buscarChip('Bogota')">Bogotá</span>
    <span class="chip" onclick="buscarChip('Cucuta')">Cúcuta</span>
    <span class="chip" onclick="buscarChip('Medellin')">Medellín</span>
    <span class="chip" onclick="buscarChip('Cali')">Cali</span>
    <span class="chip" onclick="buscarChip('Soledad')">Soledad</span>
  </div>
</div>

<div class="buscador">
  <div class="input-wrap">
    <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input
      type="text"
      id="busqueda"
      placeholder="Escriba una ciudad o entidad…"
      onkeydown="if(event.key==='Enter') consultar()"
    >
  </div>
  <button class="btn-consultar" onclick="consultar()">Consultar</button>
</div>

<div id="errorMsg" class="error-msg">No se encontraron resultados para esa búsqueda.</div>

<div id="contenedorResultados"></div>

<script>
var datos = [
  { organismo:"Secretaría de Movilidad de Medellín",                                            inicio:"10/12/2018", final:"28/04/2020", impuestos:"717.318",   pagados:"147.003", recaudado:"$62.415.361" },
  { organismo:"División de Tránsito y Transporte de La Dorada",                                 inicio:"10/12/2018", final:"03/09/2019", impuestos:"16.458",    pagados:"5.363",   recaudado:"$3.556.475" },
  { organismo:"Inspección Municipal de Tránsito de Villavicencio",                              inicio:"10/12/2018", final:"20/10/2019", impuestos:"16.330",    pagados:"3.405",   recaudado:"$2.342.176" },
  { organismo:"Secretaría de Movilidad de Santiago de Cali",                                    inicio:"10/12/2018", final:"21/11/2024", impuestos:"2.718.256", pagados:"303.757", recaudado:"$292.228.027" },
  { organismo:"Secretaría Distrital de Movilidad Bogotá",                                       inicio:"12/12/2018", final:"06/01/2020", impuestos:"293.869",   pagados:"107.326", recaudado:"$70.773.410" },
  { organismo:"Secretaría Distrital de Tránsito y Seguridad Vial de Barranquilla",              inicio:"27/12/2018", final:"17/09/2019", impuestos:"131.251",   pagados:"5.919",   recaudado:"$13.261.821" },
  { organismo:"Instituto Municipal de Tránsito y Transporte de Corozal",                        inicio:"18/12/2018", final:"24/07/2019", impuestos:"16.910",    pagados:"4.546",   recaudado:"$2.819.193" },
  { organismo:"Departamento Administrativo de Transporte y Tránsito de Villa del Rosario",     inicio:"14/01/2019", final:"31/10/2019", impuestos:"7.944",     pagados:"1.181",   recaudado:"$811.870" },
  { organismo:"Secretaría de Movilidad de Itagüí",                                             inicio:"01/02/2019", final:"05/07/2020", impuestos:"43.964",    pagados:"9.620",   recaudado:"$4.790.707" },
  { organismo:"Secretaría de Movilidad y Tránsito de Sabaneta",                                inicio:"01/02/2019", final:"21/11/2024", impuestos:"337.938",   pagados:"79.821",  recaudado:"$54.462.600" },
  { organismo:"Secretaría de Movilidad de Bello",                                              inicio:"27/02/2019", final:"18/02/2020", impuestos:"103.842",   pagados:"13.468",  recaudado:"$9.868.468" },
  { organismo:"Instituto Municipal de Tránsito y Transporte de Soledad",                       inicio:"26/03/2019", final:"09/12/2019", impuestos:"18.978",    pagados:"3.220",   recaudado:"$2.086.329" },
  { organismo:"Secretaría de tránsito y Transporte de la Alcaldía de San José de Cúcuta",     inicio:"26/03/2019", final:"21/11/2024", impuestos:"295.755",   pagados:"66.353",  recaudado:"$53.001.418" },
  { organismo:"Secretaría de Movilidad Contemporánea de Cundinamarca",                         inicio:"30/04/2019", final:"21/11/2024", impuestos:"406.509",   pagados:"109.002", recaudado:"$104.433.257" }
];

function normalizar(t) {
  return t.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim();
}

function parsearNumero(s) {
  return parseInt(s.replace(/\./g,""), 10) || 0;
}

function calcularPct(pagados, impuestos) {
  var p = parsearNumero(pagados);
  var i = parsearNumero(impuestos);
  if (!i) return 0;
  return Math.min(100, Math.round(p / i * 100));
}

function crearResultado(item) {
  var pct = calcularPct(item.pagados, item.impuestos);
  return '<div class="resultado">'
    + '<div class="resultado-header">'
    + '<div class="resultado-icono">'
    + '<svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>'
    + '</div>'
    + '<div class="resultado-nombre">' + item.organismo + '</div>'
    + '</div>'
    + '<div class="grid">'
    + '<div class="card"><div class="card-label">Fecha inicial</div><div class="card-valor">' + item.inicio + '</div></div>'
    + '<div class="card"><div class="card-label">Fecha final</div><div class="card-valor">' + item.final + '</div></div>'
    + '<div class="card"><div class="card-label">Comparendos impuestos</div><div class="card-valor">' + item.impuestos + '</div></div>'
    + '<div class="card"><div class="card-label">Comparendos pagados</div><div class="card-valor highlight">' + item.pagados
    + '<div class="barra-wrap"><div class="barra-fill" style="width:' + pct + '%"></div></div>'
    + '<div class="barra-pct">' + pct + '% del total</div></div></div>'
    + '<div class="card"><div class="card-label">Recaudado</div><div class="card-valor highlight">' + item.recaudado + '</div></div>'
    + '</div></div>';
}

function consultar() {
  var texto = normalizar(document.getElementById("busqueda").value);
  var contenedor = document.getElementById("contenedorResultados");
  var errorMsg   = document.getElementById("errorMsg");

  contenedor.innerHTML = "";
  errorMsg.style.display = "none";

  if (texto === "") return;

  var resultados = datos.filter(function(item) {
    return normalizar(item.organismo).indexOf(texto) !== -1;
  });

  if (resultados.length === 0) {
    errorMsg.style.display = "block";
    return;
  }

  var html = "";
  for (var i = 0; i < resultados.length; i++) {
    html += crearResultado(resultados[i]);
  }
  contenedor.innerHTML = html;
}

function buscarChip(texto) {
  document.getElementById("busqueda").value = texto;
  consultar();
}
</script>

</body>
</html>
